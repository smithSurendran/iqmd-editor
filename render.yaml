services:
  - type: web
    name: iqmd-api
    runtime: docker
    plan: starter
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    healthCheckPath: /health
    preDeployCommand: alembic upgrade head && python seed.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: iqmd-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: FRONTEND_URL
        value: https://iqmd-web.onrender.com
      - key: LIBREOFFICE_PATH
        value: soffice

  - type: web
    name: iqmd-web
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build --workspace=apps/web
    startCommand: npm run start --workspace=apps/web -- -p $PORT
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_API_URL
        value: https://iqmd-api.onrender.com

databases:
  - name: iqmd-db
    plan: basic-256mb
    databaseName: iqmd_db
    user: iqmd
    postgresMajorVersion: "16"
